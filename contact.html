    .bg-clouds { position: absolute; top: 6%; left: 0; width: 200%; height: 80px; animation: cloudScroll 40s linear infinite; }

    .bg-trees { position: absolute; bottom: 12%; left: 0; right: 0; height: 80px; }
    .tree-item { position: absolute; bottom: 0; }

    .tree-top::after { content: ''; position: absolute; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 28px solid #3aaa28; top: -18px; left: -12px; }
    .tree-trunk { width: 10px; height: 18px; background: #7a5530; margin: 0 auto; }
    .walker { position: absolute; bottom: 13.5%; animation: walkAcross 12s linear infinite; }

    .bg-ground { position: absolute; bottom: 0; left: 0; right: 0; }
